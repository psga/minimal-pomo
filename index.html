<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Pomodoro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <button class="icon-btn settings-btn" id="settingsBtn" aria-label="Settings">
        <svg viewBox="0 0 24 24" width="28" height="28" stroke="currentColor" stroke-width="1.5" fill="none">
            <path d="M12 15a3 3 0 100-6 3 3 0 000 6z" />
            <path
                d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z" />
        </svg>
    </button>
    <button class="icon-btn chart-btn" id="chartBtn" aria-label="Activity History">
        <svg viewBox="0 0 24 24" width="28" height="28" stroke="currentColor" stroke-width="1.5" fill="none">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
            <line x1="8" y1="12" x2="8" y2="16" />
            <line x1="12" y1="8" x2="12" y2="16" />
            <line x1="16" y1="13" x2="16" y2="16" />
        </svg>
    </button>

    <main class="app-container">
        <h2 id="modeText" class="mode-text">FOCUS</h2>
        <div class="timer" id="timer">25:00</div>

        <div class="controls-wrapper" id="controlsWrapper">
            <button class="icon-btn btn-main" id="mainBtn" aria-label="Play/Pause">
                <svg id="mainIcon" viewBox="0 0 24 24" width="40" height="40" stroke="currentColor" stroke-width="1.5"
                    fill="none">
                    <polygon points="5 3 19 12 5 21 5 3"></polygon>
                </svg>
            </button>
            <button class="icon-btn btn-restart" id="restartBtn" aria-label="Restart">
                <svg viewBox="0 0 24 24" width="40" height="40" stroke="currentColor" stroke-width="1.5" fill="none">
                    <polyline points="1 4 1 10 7 10"></polyline>
                    <path d="M3.51 15a9 9 0 102.13-9.36L1 10"></path>
                </svg>
            </button>
        </div>

        <div class="dots" id="dotsContainer"></div>
    </main>

    <div class="modal-overlay" id="settingsModal">
        <div class="modal-content">
            <div class="input-group">
                <label for="focusTime">Focus time</label>
                <div class="input-wrapper">
                    <input type="number" id="focusTime" value="25" min="1" max="120">
                    <span>min</span>
                </div>
            </div>

            <div class="input-group">
                <label for="shortBreakTime">Short break</label>
                <div class="input-wrapper">
                    <input type="number" id="shortBreakTime" value="5" min="1" max="60">
                    <span>min</span>
                </div>
            </div>

            <div class="input-group">
                <label for="longBreakTime">Long break</label>
                <div class="input-wrapper">
                    <input type="number" id="longBreakTime" value="15" min="1" max="120">
                    <span>min</span>
                </div>
            </div>

            <div class="input-group">
                <label for="longBreakInterval">Cycles for long break</label>
                <div class="input-wrapper">
                    <input type="number" id="longBreakInterval" value="4" min="1" max="10">
                    <span>cycles</span>
                </div>
            </div>

            <div class="input-group checkbox-group">
                <label for="autoBreak">Auto-start breaks</label>
                <input type="checkbox" id="autoBreak">
            </div>

            <div class="input-group checkbox-group">
                <label for="autoFocus">Auto-start focus</label>
                <input type="checkbox" id="autoFocus">
            </div>

            <div class="input-group checkbox-group">
                <label for="enableSound">Enable notifications</label>
                <input type="checkbox" id="enableSound" checked>
            </div>

            <div class="input-group">
                <label>Notification Sound</label>
                <div class="sound-controls">
                    <div class="custom-select" id="soundSelectContainer">
                        <div class="select-trigger" id="soundSelectTrigger">
                            <span id="soundSelectValue">Classic</span>
                            <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2"
                                fill="none">
                                <polyline points="6 9 12 15 18 9"></polyline>
                            </svg>
                        </div>
                        <div class="select-options" id="soundSelectOptions">
                            <div class="select-option" data-value="audio/sound1.mp3">Classic</div>
                            <div class="select-option" data-value="audio/house.mp3">House</div>
                            <div class="select-option" data-value="audio/l_mysterious.mp3">00-Mysterious</div>
                            <div class="select-option" data-value="audio/l_positive.mp3">00-Positive</div>
                            <div class="select-option" data-value="audio/scary.mp3">Scary</div>
                        </div>
                    </div>
                    <button id="testSoundBtn" class="secondary-btn">Test</button>
                </div>
            </div>

            <button class="primary-btn" id="saveBtn">Save Settings</button>
        </div>
    </div>

    <div class="modal-overlay" id="activityModal">
        <div class="activity-container">
            <div class="activity-header">
                <span id="activityDate" class="activity-date">Today</span>
                <button class="icon-btn log-btn-inline" id="logBtn" aria-label="Session Log">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none">
                        <path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01" />
                    </svg>
                </button>
            </div>

            <div class="activity-chart-wrapper">
                <div class="timeline" id="activityTimeline">
                    <div class="timeline-content" id="timelineContent">
                        <!-- Segments will be injected here -->
                    </div>
                </div>
                <div class="timeline-hours">
                    <span>0:00</span>
                    <span>6:00</span>
                    <span>12:00</span>
                    <span>18:00</span>
                    <span>23:59</span>
                </div>
                <div id="timelineTooltip" class="timeline-tooltip">
                    <div class="tooltip-note"></div>
                    <div class="tooltip-time"></div>
                </div>
            </div>

            <div id="noteEditor" class="note-editor">
                <button id="deleteNoteBtn" class="delete-btn-minimal" aria-label="Delete Session">&times;</button>
                <input type="text" id="noteInput" placeholder="Write a note for this segment...">
                <button id="saveNoteBtn">Save</button>
            </div>

            <div class="activity-nav">
                <button id="prevDayBtn">Prev</button>
                <button id="nextDayBtn">Next</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="logModal">
        <div class="log-container">
            <div class="log-header">
                <h2>SESSION LOG</h2>
                <div id="totalFocusSessions" class="log-stats">0 Sessions</div>
            </div>
            <div id="logList" class="log-list">
                <!-- Log entries will be injected here -->
            </div>
        </div>
    </div>

    <script src="js/constants.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/timer.js"></script>
    <script src="js/activity.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
